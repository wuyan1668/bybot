services:
  combo-strategy:
    build: .
    container_name: combo-strategy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_ENV_FILE: /app/.env
    volumes:
      - ./.env:/app/.env:ro
      - ./state:/app/state
      - ./combo_strategy.log:/app/combo_strategy.log
    command: ["python", "main.py"]
